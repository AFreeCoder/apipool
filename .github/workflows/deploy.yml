name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/opt/sub2api"
            DEPLOY_DIR="$APP_DIR/deploy"
            BACKUP_DIR="/opt/sub2api/backups"
            REPO_URL="https://github.com/AFreeCoder/apipool.git"
            PREDEPLOY_BACKUP_RETENTION_HOURS="168"
            ROLLBACK_TAGS_TO_KEEP="8"
            DOCKER_BUILDX_CACHE_MAX_USED_SPACE="6gb"

            require_command() {
              command -v "$1" >/dev/null 2>&1 || {
                echo "缺少命令: $1" >&2
                exit 1
              }
            }

            tag_current_image_for_rollback() {
              current_commit="$1"
              rollback_ts="$(date +%Y%m%d_%H%M%S)"
              rollback_tag="deploy-sub2api:rollback-${rollback_ts}-${current_commit}"

              if docker image inspect deploy-sub2api:latest >/dev/null 2>&1; then
                docker tag deploy-sub2api:latest "$rollback_tag"
                docker tag deploy-sub2api:latest deploy-sub2api:rollback-latest
                {
                  echo "created_at=$rollback_ts"
                  echo "source_commit=$current_commit"
                  echo "rollback_tag=$rollback_tag"
                  echo "rollback_alias=deploy-sub2api:rollback-latest"
                } > "$BACKUP_DIR/last-rollback-image.txt"
                echo "已创建回退镜像标签: $rollback_tag"
                echo "已更新回退镜像别名: deploy-sub2api:rollback-latest"
              else
                echo "未发现 deploy-sub2api:latest，跳过回退镜像打标"
              fi
            }

            load_deploy_env() {
              if [ -f "$DEPLOY_DIR/.env" ]; then
                set -a
                . "$DEPLOY_DIR/.env"
                set +a
              fi

              PREDEPLOY_BACKUP_RETENTION_HOURS="${PREDEPLOY_BACKUP_RETENTION_HOURS:-168}"
              ROLLBACK_TAGS_TO_KEEP="${ROLLBACK_TAGS_TO_KEEP:-8}"
              DOCKER_BUILDX_CACHE_MAX_USED_SPACE="${DOCKER_BUILDX_CACHE_MAX_USED_SPACE:-6gb}"
            }

            wait_for_health() {
              name="$1"
              timeout="${2:-180}"
              elapsed=0
              while [ "$elapsed" -lt "$timeout" ]; do
                state="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$name" 2>/dev/null || true)"
                case "$state" in
                  healthy|running)
                    echo "$name 状态正常: $state"
                    return 0
                    ;;
                  unhealthy|exited|dead)
                    echo "$name 状态异常: $state" >&2
                    docker logs --tail 200 "$name" || true
                    return 1
                    ;;
                esac
                sleep 5
                elapsed=$((elapsed + 5))
              done

              echo "等待 $name 健康检查超时" >&2
              docker logs --tail 200 "$name" || true
              return 1
            }

            prune_old_rollback_tags() {
              keep="${ROLLBACK_TAGS_TO_KEEP:-8}"
              idx=0
              docker images --format '{{.Repository}}:{{.Tag}}' \
                | grep '^deploy-sub2api:rollback-' \
                | grep -v ':rollback-latest$' \
                | sort -r \
                | while IFS= read -r stale_tag; do
                    idx=$((idx + 1))
                    if [ "$idx" -le "$keep" ]; then
                      continue
                    fi
                    docker rmi "$stale_tag" >/dev/null 2>&1 || true
                  done
            }

            prune_build_cache() {
              if docker buildx version >/dev/null 2>&1; then
                docker buildx prune -f --max-used-space "${DOCKER_BUILDX_CACHE_MAX_USED_SPACE:-6gb}" >/dev/null 2>&1 || true
              fi
            }

            require_command git
            require_command docker
            require_command gzip
            load_deploy_env

            FREE_KB="$(df -Pk /opt | awk 'NR==2 {print $4}')"
            if [ -z "$FREE_KB" ] || [ "$FREE_KB" -lt $((5 * 1024 * 1024)) ]; then
              echo "/opt 可用磁盘不足 5GB，停止部署" >&2
              exit 1
            fi

            # ============================================================
            # 部署前备份（必须在代码更新和 compose up 之前执行）
            # 首次部署时 postgres 容器不存在，跳过备份
            # ============================================================
            mkdir -p "$BACKUP_DIR"
            if docker ps --filter "name=^sub2api-postgres$" --format '{{.Names}}' | grep -q .; then
              DB_USER="$(docker exec sub2api-postgres printenv POSTGRES_USER)"
              DB_NAME="$(docker exec sub2api-postgres printenv POSTGRES_DB)"
              if [ -z "$DB_USER" ] || [ -z "$DB_NAME" ]; then
                echo "无法从 postgres 容器读取 POSTGRES_USER / POSTGRES_DB，停止部署" >&2
                exit 1
              fi

              BACKUP_FILE="${BACKUP_DIR}/pre-deploy-$(date +%Y%m%d_%H%M%S).sql.gz"
              echo "开始部署前备份..."
              docker exec sub2api-postgres pg_dump -U "$DB_USER" -d "$DB_NAME" --clean --if-exists \
                | gzip > "$BACKUP_FILE"
              if [ -s "$BACKUP_FILE" ] && gzip -t "$BACKUP_FILE"; then
                echo "备份成功: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"
                find "$BACKUP_DIR" -maxdepth 1 -type f -name 'pre-deploy-*.sql.gz' -mmin "+$((PREDEPLOY_BACKUP_RETENTION_HOURS * 60))" -delete
              else
                echo "备份失败，中止部署！" >&2
                rm -f "$BACKUP_FILE"
                exit 1
              fi
            else
              echo "首次部署，跳过数据库备份"
            fi

            # 首次部署：克隆仓库
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            CURRENT_REMOTE="$(git remote get-url origin 2>/dev/null || true)"
            if [ "$CURRENT_REMOTE" != "$REPO_URL" ]; then
              git remote set-url origin "$REPO_URL"
            fi

            CURRENT_DEPLOY_COMMIT="$(git rev-parse --short=12 HEAD 2>/dev/null || echo unknown)"
            tag_current_image_for_rollback "$CURRENT_DEPLOY_COMMIT"

            # 拉取最新代码
            git fetch --tags origin main
            git reset --hard origin/main

            # 构建并重启服务（从源码构建镜像）
            cd "$DEPLOY_DIR"
            if [ ! -f .env ]; then
              echo "缺少 $DEPLOY_DIR/.env，停止部署" >&2
              exit 1
            fi
            FILE_VERSION="$(bash "$APP_DIR/deploy/version_resolver.sh" file "$APP_DIR" || true)"
            TAG_VERSION="$(bash "$APP_DIR/deploy/version_resolver.sh" tag "$APP_DIR" || true)"
            APP_VERSION="$(bash "$APP_DIR/deploy/version_resolver.sh" resolve "$APP_DIR" || true)"
            if [ -z "$APP_VERSION" ]; then
              echo "无法读取版本号文件 $APP_DIR/backend/cmd/server/VERSION，停止部署" >&2
              exit 1
            fi
            if [ -n "$FILE_VERSION" ] && [ -n "$TAG_VERSION" ] && [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
              echo "VERSION 文件($FILE_VERSION)与最新发布 tag($TAG_VERSION)不一致，部署版本以 VERSION 文件为准"
            fi
            APP_COMMIT="$(git rev-parse --short=12 HEAD)"
            APP_BUILD_DATE="$(git log -1 --format=%cI HEAD)"
            echo "构建版本: ${APP_VERSION} (${APP_COMMIT})"
            docker compose -f docker-compose.deploy.yml config -q
            docker compose -f docker-compose.deploy.yml build \
              --build-arg VERSION="$APP_VERSION" \
              --build-arg COMMIT="$APP_COMMIT" \
              --build-arg DATE="$APP_BUILD_DATE" \
              sub2api

            # 清理之前部署失败遗留的重命名容器（格式: <hash>_sub2api*）
            # Docker Compose recreate 先 rename 旧容器再创建新容器，如果中途失败，
            # 下次 recreate 会因为重命名目标已存在而报 Conflict 错误。
            for stale in $(docker ps -a --format '{{.Names}}' | grep -E '^[0-9a-f]+_sub2api'); do
              echo "清理残留容器: $stale"
              docker rm -f "$stale" 2>/dev/null || true
            done

            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            wait_for_health sub2api-postgres 180
            wait_for_health sub2api-redis 180
            wait_for_health sub2api 300

            # 清理悬空镜像
            docker image prune -f

            # ============================================================
            # 企业版实例：如果已部署则同步更新（使用新镜像重启）
            # ============================================================
            BIZ_COMPOSE="$DEPLOY_DIR/docker-compose.biz.yml"
            BIZ_ENV="$DEPLOY_DIR/.env.biz"
            if [ -f "$BIZ_COMPOSE" ] && [ -f "$BIZ_ENV" ]; then
              echo "检测到企业版实例配置，同步更新..."
              # 企业版数据库备份（如果容器在运行）
              BIZ_DB_NAME=$(grep '^BIZ_POSTGRES_DB=' "$BIZ_ENV" | cut -d= -f2)
              BIZ_DB_NAME="${BIZ_DB_NAME:-sub2api_biz}"
              if docker ps --filter "name=^sub2api-biz$" --format '{{.Names}}' | grep -q .; then
                BIZ_BACKUP_FILE="${BACKUP_DIR}/pre-deploy-biz-$(date +%Y%m%d_%H%M%S).sql.gz"
                echo "备份企业版数据库: $BIZ_DB_NAME"
                docker exec sub2api-postgres pg_dump -U "$DB_USER" -d "$BIZ_DB_NAME" --clean --if-exists \
                  | gzip > "$BIZ_BACKUP_FILE"
                if [ -s "$BIZ_BACKUP_FILE" ] && gzip -t "$BIZ_BACKUP_FILE"; then
                  echo "企业版备份成功: $BIZ_BACKUP_FILE ($(du -h "$BIZ_BACKUP_FILE" | cut -f1))"
                  find "$BACKUP_DIR" -maxdepth 1 -type f -name 'pre-deploy-biz-*.sql.gz' -mmin "+$((PREDEPLOY_BACKUP_RETENTION_HOURS * 60))" -delete
                else
                  echo "企业版备份失败，跳过（不阻塞部署）" >&2
                  rm -f "$BIZ_BACKUP_FILE"
                fi
              fi
              # BIZ compose 仅声明 sub2api-biz，若带 --remove-orphans 会误删同 project 下的主站容器。
              # 旧的 sub2api-biz 不是总能被当前 compose 项目接管，先显式删除可避免同名冲突。
              if docker ps -a --filter "name=^sub2api-biz$" --format '{{.Names}}' | grep -q .; then
                docker rm -f sub2api-biz >/dev/null 2>&1 || true
              fi
              docker compose -f "$BIZ_COMPOSE" --env-file "$BIZ_ENV" up -d
              wait_for_health sub2api-biz 180
              echo "企业版实例更新完成"
            else
              echo "未检测到企业版实例配置，跳过"
            fi

            prune_old_rollback_tags
            prune_build_cache

            echo "部署完成！"
